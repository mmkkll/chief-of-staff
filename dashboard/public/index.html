<!doctype html>
<html lang="en" class="dark">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <meta name="color-scheme" content="dark" />
  <title>MISSION CONTROL</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
  <script src="https://cdn.tailwindcss.com?plugins=forms"></script>
  <link rel="stylesheet" href="/styles.css" />
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          fontFamily: {
            sans: ['Inter', 'ui-sans-serif', 'system-ui', 'sans-serif'],
            mono: ['"JetBrains Mono"', 'ui-monospace', 'monospace'],
          },
          colors: {
            bg:  '#1a1c22',
            'bg-hi': '#1e2027',
            'bg-lo': '#14161b',
            ink: { 0: '#e9eef5', 1: '#9aa3b2', 2: '#6b7484', 3: '#434b5a' },
            accent: { DEFAULT: '#7ef3d6', dim: '#4acfb1', warm: '#ffd166', hot: '#ff6b81', cool: '#8ab4ff' },
          },
          borderRadius: { xl2: '20px', card: '24px' },
        },
      },
    };
  </script>
</head>
<body class="min-h-dvh bg-bg text-ink-0 font-sans antialiased selection:bg-accent/30 selection:text-ink-0">
  <div id="bg-glow" aria-hidden="true"></div>

  <header class="mc-header fixed inset-x-4 top-4 z-40 rounded-2xl">
    <div class="mx-auto max-w-[1600px] px-5 h-14 flex items-center gap-5">
      <a href="#/" class="flex items-center gap-2.5 group">
        <span class="dot ok"></span>
        <span class="font-mono text-[11px] tracking-[0.22em] text-ink-0 uppercase">Mission<span class="text-accent px-1">·</span>Control</span>
      </a>

      <nav id="topnav" class="flex-1 flex items-center gap-1 ml-3 overflow-x-auto no-scrollbar"></nav>

      <div class="hidden md:flex items-center gap-4 text-[10px] font-mono uppercase tracking-[0.18em] text-ink-2">
        <span class="flex items-center gap-2"><span class="dot ok" style="width:8px;height:8px"></span>Live · 15s</span>
        <span id="clock" class="text-ink-1"></span>
      </div>
    </div>
  </header>

  <main id="view" class="pt-28 pb-16 px-5 mx-auto max-w-[1600px] relative z-10"></main>

  <script type="module" src="/app.js"></script>
</body>
</html>
